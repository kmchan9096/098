<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溝通表達：活動選擇 (全螢幕回饋版)</title>
    <style>
        /* 基本重置與全螢幕設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            background-color: #FFFFFF; /* 1. 整個版面背景顏色是白色 */
            transition: box-shadow 0.3s ease;
        }

        /* 閒置時的螢幕邊框閃爍動畫 (加強明顯度，改為紅橘色大光暈) */
        body.idle-flash {
            animation: borderFlash 1s infinite alternate;
        }
        @keyframes borderFlash {
            0% { box-shadow: inset 0 0 0 0 rgba(255, 60, 0, 0); }
            100% { box-shadow: inset 0 0 100px 50px rgba(255, 60, 0, 0.85); } /* 光暈更深、更廣 */
        }

        /* 頁面容器設定：只有一頁，置中排列 */
        .page {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
            justify-content: space-evenly; 
            align-items: center;
        }

        /* 眼控按鈕設計：佔據 40% */
        .option-btn {
            width: 40vw;  
            height: 80vh; 
            position: relative;
            /* 2. 邊框顏色再突出一些，預設為超粗紅色 */
            border: 12px solid #FF0000; 
            border-radius: 40px;    
            background-color: #222; /* 內部保留深色，讓圖片與邊框更對比 */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            transition: all 0.3s ease; 
        }

        /* 2. 視線掃過 (Hover) 時，邊框變為亮黃色並發光 */
        .option-btn:hover {
            border-color: #FFFF00; 
            background-color: #444; 
            box-shadow: 0 0 60px rgba(255, 255, 0, 0.8); 
        }
        
        /* 圖片容器：背景設為白色 */
        .img-container {
            width: 90%;
            height: 90%;
            background-color: #FFFFFF; 
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            z-index: 2;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 懸停點擊視覺進度條 (黃色填滿) */
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 0%;
            width: 100%;
            background-color: rgba(255, 255, 0, 0.6); 
            z-index: 1;
            transition: height 0s linear;
        }

        /* 觸發懸停動畫 (1 秒) */
        .option-btn.dwelling .progress-overlay {
            height: 100%;
            transition: height 1s linear; 
        }

        /* --- 6. 全螢幕視覺回饋專用圖層 --- */
        #fullscreen-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #FFFFFF; /* 全白背景 */
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #fullscreen-view.show {
            opacity: 1;
            visibility: visible;
        }
        #fullscreen-view img {
            width: 90vw;
            height: 90vh;
            object-fit: contain;
        }

    </style>
</head>
<body>

    <div id="page1" class="page">
        <div class="option-btn" data-text="我想先玩感官教具">
            <div class="progress-overlay"></div>
            <div class="img-container"><img src="1.JPG" alt="觸感教具"></div>
        </div>
        <div class="option-btn" data-text="我想先看點讀筆圖書">
            <div class="progress-overlay"></div>
            <div class="img-container"><img src="2.jpg" alt="點讀筆圖書"></div>
        </div>
    </div>

    <div id="fullscreen-view">
        <img id="fs-img" src="" alt="全螢幕展示">
    </div>

    <script>
        // --- 教師設定區 ---
        const DWELL_TIME = 1000; // 懸停觸發時間：1秒
        const IDLE_TIME = 5000;  // 閒置提示時間：5秒
        const FULLSCREEN_DUR = 5000; // 全螢幕展示時間：5000 代表 5 秒
        // ------------------

        let dwellTimer = null;
        let idleTimer = null;
        let isSpeaking = false; 
        let isIdlePrompting = false; 
        let isSystemUnlocked = false; 
        let isShowingFullscreen = false; // 記錄是否正在全螢幕展示中
        const buttons = document.querySelectorAll('.option-btn');
        const fullscreenView = document.getElementById('fullscreen-view');
        const fsImg = document.getElementById('fs-img');

        // 成功選取時的「叮」聲
        function playDing() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            const audioCtx = new AudioContext();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        // --- 閒置提示邏輯 ---
        function startIdleTimer() {
            if (!isSystemUnlocked || isShowingFullscreen) return; // 全螢幕展示時不計算閒置
            clearTimeout(idleTimer);
            
            idleTimer = setTimeout(() => {
                if (!isSpeaking) {
                    document.body.classList.add('idle-flash'); 
                    speakText("請看螢幕", null, true); 
                }
            }, IDLE_TIME);
        }

        function stopIdleTimer() {
            clearTimeout(idleTimer);
            document.body.classList.remove('idle-flash'); 
        }

        // --- 語音朗讀功能 ---
        function speakText(text, callback, isIdle = false) {
            window.speechSynthesis.cancel(); 
            isSpeaking = true;
            isIdlePrompting = isIdle; 
            stopIdleTimer(); 

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-HK'; 
            utterance.rate = 0.9;     

            utterance.onend = () => {
                isSpeaking = false;
                isIdlePrompting = false;
                if(callback) callback();
                startIdleTimer(); 
            };
            window.speechSynthesis.speak(utterance);
        }

        // --- 觸發全螢幕視覺回饋 ---
        function showFullscreenReward(imgSrc, textToSpeak) {
            isShowingFullscreen = true;
            stopIdleTimer(); // 停止閒置計時

            // 設定全螢幕圖片並顯示
            fsImg.src = imgSrc;
            fullscreenView.classList.add('show');

            // 播放語音
            setTimeout(() => {
                speakText(textToSpeak);
            }, 400);

            // 5 秒後自動關閉全螢幕，恢復選擇畫面
            setTimeout(() => {
                fullscreenView.classList.remove('show');
                isShowingFullscreen = false;
                startIdleTimer(); // 重新開始閒置計時
            }, FULLSCREEN_DUR);
        }

        // --- 眼控按鈕事件處理 ---
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                if (isShowingFullscreen) return; // 全螢幕時不觸發按鈕
                if (isSpeaking && !isIdlePrompting) return; 
                
                stopIdleTimer(); 
                if(isIdlePrompting) {
                    window.speechSynthesis.cancel(); 
                    isSpeaking = false;
                    isIdlePrompting = false;
                }

                btn.classList.add('dwelling'); 
                
                dwellTimer = setTimeout(() => {
                    btn.classList.remove('dwelling'); 
                    
                    const textToSpeak = btn.getAttribute('data-text');
                    const imgSrc = btn.querySelector('img').src; // 抓取被選中的圖片網址
                    
                    playDing(); // 播放叮聲
                    
                    // 觸發全螢幕放大回饋與語音
                    showFullscreenReward(imgSrc, textToSpeak);

                }, DWELL_TIME);
            });

            btn.addEventListener('mouseleave', () => {
                if (isShowingFullscreen) return;
                btn.classList.remove('dwelling'); 
                clearTimeout(dwellTimer);   
                startIdleTimer(); 
            });
        });

        // 首次點擊網頁解鎖
        document.body.addEventListener('click', () => {
            if (isSystemUnlocked) return;
            isSystemUnlocked = true;

            const unlockSpeech = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlockSpeech);
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const audioCtx = new AudioContext();
                audioCtx.resume();
            }
            startIdleTimer();
        }, { once: true });

    </script>
</body>
</html>
